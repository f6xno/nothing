<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Unknown</title>

<style>
html,body{
margin:0;
width:100%;
height:100%;
background:black;
overflow:hidden;
font-family:Arial;
}

/* الصفحة الأولى */
#intro{
height:100%;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
color:white;
}

/* العنصر الغامض */
#mystery{
width:60px;
height:60px;
cursor:pointer;
opacity:0.7;
transition:0.3s;
}

#mystery:hover{
opacity:1;
transform:scale(1.1);
}

/* الصفحة الثانية */
#main{
display:none;
position:fixed;
inset:0;
}

#main img{
width:100%;
height:100%;
object-fit:cover;
}

/* الانستغرام */
#credit{
position:fixed;
top:10px;
right:10px;
z-index:1000;
}

#credit a{
color:white;
text-decoration:none;
display:flex;
align-items:center;
gap:5px;
}

#credit img{
width:18px;
height:18px;
}
</style>
</head>

<body>

<div id="credit">
<a href="https://instagram.com/f6xno" target="_blank">
<img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png">
@f6xno
</a>
</div>

<!-- الصفحة الغامضة -->
<div id="intro">

<p style="opacity:0.6">something is watching</p>

<img id="mystery"
src="https://cdn-icons-png.flaticon.com/512/159/159604.png">

</div>

<!-- الصفحة الرئيسية -->
<div id="main">
<img src="image.gif">
<audio id="sound" src="sound.mp3"></audio>
</div>

<script>

const intro = document.getElementById("intro");
const main = document.getElementById("main");
const mystery = document.getElementById("mystery");
const sound = document.getElementById("sound");

mystery.onclick = () => {

intro.style.display="none";
main.style.display="block";

document.documentElement.requestFullscreen();

sound.play();

};

</script>

</body>
</html>
