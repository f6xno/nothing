<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>space</title>

<style>
html,body{
  margin:0;
  height:100%;
  overflow:hidden;
  background:#000;
  font-family:Arial;
}

/* الخلفية نجوم متحركة */
canvas{
  position:fixed;
  top:0;
  left:0;
}

/* النقطة الصفراء النابضة */
#trigger{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:30px;       /* أكبر من قبل */
  height:30px;
  background:yellow; /* أصفر */
  border-radius:50%;
  cursor:pointer;
  box-shadow:0 0 25px yellow;
  transition:0.3s;
  animation: pulse 2s infinite ease-in-out;
}

/* تأثير النبض (تكبر وتصغر) */
@keyframes pulse{
  0% { transform: translate(-50%, -50%) scale(1); box-shadow:0 0 25px yellow;}
  50% { transform: translate(-50%, -50%) scale(1.3); box-shadow:0 0 40px yellow;}
  100% { transform: translate(-50%, -50%) scale(1); box-shadow:0 0 25px yellow;}
}

/* صفحة الجيف */
#main{
  display:none;
  position:fixed;
  inset:0;
}

#main img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* الانستغرام */
#credit{
  position:fixed;
  top:10px;
  right:10px;
  z-index:100;
}

#credit a{
  color:white;
  text-decoration:none;
  display:flex;
  align-items:center;
  gap:8px;
  font-size:20px;   /* تكبير اسم dzp */
}

#credit img{
  width:28px;       /* تكبير أيقونة الديسكورد */
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<!-- النقطة النابضة -->
<div id="trigger"></div>

<!-- الديسكورد -->
<div id="credit">
<a href="https://discord.gg/tDcaysxES3" target="_blank">
<img src="https://cdn-icons-png.flaticon.com/512/2111/2111370.png">
DZP 
</a>
</div>

<!-- صفحة الجيف -->
<div id="main">
<img src="image.gif">
<audio id="sound" src="sound.mp3"></audio>
</div>

<script>
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

canvas.width = innerWidth;
canvas.height = innerHeight;

let particles = [];

for(let i=0;i<120;i++){
  particles.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    size:Math.random()*2,
    speed:Math.random()*0.5
  });
}

function animate(){
  ctx.fillStyle="black";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle="white";
  particles.forEach(p=>{
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
    ctx.fill();
    p.y += p.speed;
    if(p.y>canvas.height){
      p.y=0;
      p.x=Math.random()*canvas.width;
    }
  });

  requestAnimationFrame(animate);
}

animate();

const trigger = document.getElementById("trigger");
const main = document.getElementById("main");
const sound = document.getElementById("sound");

trigger.onclick = ()=>{
  canvas.style.display="none";
  trigger.style.display="none";

  main.style.display="block";

  document.documentElement.requestFullscreen();

  sound.play();
};
</script>

</body>
</html>
